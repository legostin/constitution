version: "1"
name: "acme-constitution"

settings:
  log_level: "info"
  log_file: "/tmp/constitution.log"

remote:
  enabled: true
  url: "http://localhost:8081"
  auth_token_env: ""
  timeout: 5000
  fallback: "local-only"

plugins: []

rules:
  # ── Repository Access Control ──────────────────────────────────
  - id: repo-access
    name: "Repository Allowlist"
    description: "Only allow agent execution in approved repositories"
    enabled: true  # Enable and configure patterns for your org
    priority: 1
    severity: block
    hook_events: [SessionStart]
    check:
      type: repo_access
      params:
        mode: allowlist
        patterns:
          - "github.com/acme-corp/*"
        detect_from: git_remote

  # ── Skill / Context Injection ──────────────────────────────────
  - id: skill-inject
    name: "Company Context"
    description: "Inject company-specific context at session start"
    enabled: false
    priority: 10
    severity: audit
    hook_events: [SessionStart]
    check:
      type: skill_inject
      params:
        context: |
          You are operating under ACME Corp development standards.
          Always use structured logging with slog.
          Always write table-driven tests.
        context_file: ".claude/company-context.md"

  # ── Prompt Modification ────────────────────────────────────────
  - id: prompt-safety
    name: "Safety Reminder"
    description: "Add safety reminders to all user prompts"
    enabled: true
    priority: 5
    severity: audit
    hook_events: [UserPromptSubmit]
    check:
      type: prompt_modify
      params:
        system_context: |
          IMPORTANT: Never commit secrets to code.
          Never run destructive commands without confirmation.
          Always run tests after code changes.

  # ── Secret Detection (Write/Edit) ─────────────────────────────
  - id: secret-write
    name: "Secret Detection"
    description: "Scan file content for secrets before writing"
    enabled: true
    priority: 1
    severity: block
    hook_events: [PreToolUse]
    tool_match: [Write, Edit]
    check:
      type: secret_regex
      params:
        scan_field: content
        patterns:
          - name: "AWS Access Key"
            regex: "AKIA[0-9A-Z]{16}"
          - name: "AWS Secret Key"
            regex: "(?i)aws_secret_access_key\\s*=\\s*[A-Za-z0-9/+=]{40}"
          - name: "GitHub Token"
            regex: "gh[ps]_[A-Za-z0-9_]{36,}"
          - name: "Private Key"
            regex: "-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----"
          - name: "Generic API Key"
            regex: "(?i)(api[_-]?key|secret[_-]?key)\\s*[:=]\\s*['\"]?[A-Za-z0-9_\\-]{20,}"
          - name: "JWT Token"
            regex: "eyJ[A-Za-z0-9_-]{10,}\\.eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_\\-]+"
        allow_patterns:
          - "AKIAIOSFODNN7EXAMPLE"
          - "(?i)test|example|dummy|placeholder"

  # ── Yelp detect-secrets Integration ────────────────────────────
  - id: yelp-secret-scan
    name: "Yelp Secret Detection"
    description: "Scan with Yelp detect-secrets (28+ detectors)"
    enabled: false  # Enable if detect-secrets is installed (pip install detect-secrets)
    priority: 1
    severity: block
    hook_events: [PreToolUse]
    tool_match: [Write, Edit]
    check:
      type: secret_yelp
      params:
        plugins:
          - name: AWSKeyDetector
          - name: ArtifactoryDetector
          - name: AzureStorageKeyDetector
          - name: Base64HighEntropyString
            limit: 4.5
          - name: BasicAuthDetector
          - name: GitHubTokenDetector
          - name: GitLabTokenDetector
          - name: HexHighEntropyString
            limit: 3.0
          - name: JwtTokenDetector
          - name: KeywordDetector
          - name: PrivateKeyDetector
          - name: SlackDetector
          - name: StripeDetector
          - name: TwilioKeyDetector
        exclude_lines:
          - "pragma: allowlist"
        exclude_secrets:
          - "(?i)example|test|dummy|placeholder"

  # ── Block Reading Secret Files ─────────────────────────────────
  - id: secret-read
    name: "Block Secret Files"
    description: "Prevent reading known secret/credential files"
    enabled: true
    priority: 1
    severity: block
    hook_events: [PreToolUse]
    tool_match: [Read]
    check:
      type: dir_acl
      params:
        mode: denylist
        path_field: file_path
        patterns:
          - "**/.env"
          - "**/.env.*"
          - "**/credentials.json"
          - "**/service-account*.json"
          - "**/*.pem"
          - "**/*.key"

  # ── Directory Access Control ───────────────────────────────────
  - id: dir-acl
    name: "Directory ACL"
    description: "Restrict agent access to sensitive system directories"
    enabled: true
    priority: 2
    severity: block
    hook_events: [PreToolUse]
    tool_match: [Read, Write, Edit, Glob, Grep]
    check:
      type: dir_acl
      params:
        mode: denylist
        path_field: auto
        patterns:
          - "/etc/**"
          - "/var/**"
          - "~/.ssh/**"
          - "~/.aws/**"
          - "~/.config/gcloud/**"
          - "../**"
        allow_within_project: true

  # ── Bash Command Validation ────────────────────────────────────
  - id: cmd-validate
    name: "Command Validation"
    description: "Block dangerous bash commands"
    enabled: true
    priority: 1
    severity: block
    hook_events: [PreToolUse]
    tool_match: [Bash]
    check:
      type: cmd_validate
      params:
        deny_patterns:
          - name: "Root deletion"
            regex: "rm\\s+-rf\\s+/"
          - name: "Fork bomb"
            regex: ":\\(\\)\\{\\s*:\\|:&\\s*\\};:"
          - name: "World-writable permissions"
            regex: "chmod\\s+777"
          - name: "Pipe to shell"
            regex: "curl.*\\|\\s*(bash|sh|zsh)"
          - name: "Wget pipe to shell"
            regex: "wget.*\\|\\s*(bash|sh|zsh)"
          - name: "Force push"
            regex: "\\bgit\\s+push\\s+.*--force"
          - name: "Hard reset"
            regex: "\\bgit\\s+reset\\s+--hard"
          - name: "Drop database"
            regex: "\\bdrop\\s+database\\b"
            case_insensitive: true
        allow_patterns:
          - name: "Package management"
            regex: "sudo\\s+(apt|yum|dnf|brew)"

  # ── Go Linter ──────────────────────────────────────────────────
  - id: lint-go
    name: "Go Linter"
    description: "Run golangci-lint after Go file writes"
    enabled: false  # Enable if you have golangci-lint installed
    priority: 10
    severity: warn
    hook_events: [PostToolUse]
    tool_match: [Write, Edit]
    check:
      type: linter
      params:
        file_extensions: [".go"]
        command: "golangci-lint run --timeout=30s {file}"
        working_dir: project
        timeout: 30000

  # ── Stop Validation (Completion Checks) ───────────────────────
  - id: stop-build-install
    name: "Build & Install"
    description: "Verify project compiles and binary is installed"
    enabled: true
    priority: 1
    severity: block
    hook_events: [Stop]
    message: "Build failed. Fix compilation errors before stopping."
    check:
      type: cmd_check
      params:
        command: "go build ./... && go install -ldflags='-X main.version=dev' ./cmd/constitution && go install ./cmd/constitutiond"
        working_dir: project
        timeout: 60000

  - id: stop-tests
    name: "Tests Must Pass"
    description: "Verify all tests pass before allowing agent to stop"
    enabled: true
    priority: 2
    severity: block
    hook_events: [Stop]
    message: "Tests are failing. Fix test failures before stopping."
    check:
      type: cmd_check
      params:
        command: "go test ./internal/... ./pkg/... ./cmd/... -count=1 -timeout=60s"
        working_dir: project
        timeout: 120000

  - id: stop-e2e
    name: "E2E Tests Must Pass"
    description: "Verify E2E tests pass before allowing agent to stop"
    enabled: true
    priority: 3
    severity: block
    hook_events: [Stop]
    message: "E2E tests are failing. Fix them before stopping."
    check:
      type: cmd_check
      params:
        command: "go test ./e2e/ -count=1 -timeout=60s -run 'Test(Secret|Cmd|CEL|Dir|Prompt)'"
        working_dir: project
        timeout: 120000

  - id: stop-committed
    name: "No Uncommitted Changes"
    description: "All changes must be committed before stopping"
    enabled: true
    priority: 4
    severity: block
    hook_events: [Stop]
    message: "There are uncommitted changes. Commit all changes before stopping."
    check:
      type: cmd_check
      params:
        command: "git diff --quiet && git diff --cached --quiet"
        working_dir: project
        timeout: 5000

  - id: stop-pushed
    name: "Branch Must Be Pushed"
    description: "Current branch must be pushed to remote"
    enabled: true
    priority: 5
    severity: block
    hook_events: [Stop]
    message: "Branch is not pushed. Push your branch before stopping."
    check:
      type: cmd_check
      params:
        command: "BRANCH=$(git rev-parse --abbrev-ref HEAD); git fetch origin $BRANCH --quiet 2>/dev/null; git diff --quiet $BRANCH..origin/$BRANCH 2>/dev/null"
        working_dir: project
        timeout: 10000

  - id: stop-pr-exists
    name: "PR Must Exist"
    description: "A pull request must be created for the current branch (skipped on main/master)"
    enabled: true
    priority: 6
    severity: block
    hook_events: [Stop]
    message: "No PR found for current branch. Create a PR before stopping."
    check:
      type: cmd_check
      params:
        command: "BRANCH=$(git rev-parse --abbrev-ref HEAD); if [ \"$BRANCH\" = 'main' ] || [ \"$BRANCH\" = 'master' ]; then exit 0; fi; gh pr view --json state -q '.state' 2>/dev/null | grep -qE 'OPEN|MERGED'"
        working_dir: project
        timeout: 10000

  # ── CEL Rules (Advanced) ───────────────────────────────────────
  - id: no-main-push
    name: "Block main branch push"
    description: "Prevent git push to main/master branches"
    enabled: true
    priority: 1
    severity: block
    hook_events: [PreToolUse]
    tool_match: [Bash]
    check:
      type: cel
      params:
        expression: >
          tool_input.command.contains("git push") &&
          (tool_input.command.contains("main") || tool_input.command.contains("master"))
